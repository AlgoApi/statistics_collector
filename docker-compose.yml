version: '3.8'

services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      TZ: "Europe/Moscow"
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

  bot:
    build: .
    restart: always
    depends_on:
      - db
    environment:
      TZ: "Europe/Moscow"
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      ADMIN_ID: ${ADMIN_ID}
      DB_URI: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@db/${DB_NAME}
      CHANNEL_MESSAGE_ID: ${CHANNEL_MESSAGE_ID}
      WEBAPP_URL: ${WEBAPP_URL}

  bot_api:
    build: .
    restart: always
    command: python bot.py --api
    depends_on:
      - db
    environment:
      TZ: "Europe/Moscow"
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      BOT_TOKEN: ${BOT_TOKEN}
      CHANNEL_ID: ${CHANNEL_ID}
      ADMIN_ID: ${ADMIN_ID}
      DB_URI: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@db/${DB_NAME}
      CHANNEL_MESSAGE_ID: ${CHANNEL_MESSAGE_ID}
      WEBAPP_URL: ${WEBAPP_URL}

    ports:
      - "127.0.0.1:5000:5000"

volumes:
  db_data: